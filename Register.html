<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farmer Registration | CropMonitor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">
        <span class="leaf">🌱</span> CropMonitor
      </a>
    </div>
  </header>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Create your farmer account</h1>
      <p class="subtitle">Register to start monitoring your crops and farm.</p>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" />
          <div class="form-error" id="fullNameError"></div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" />
          <div class="form-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="10-digit mobile number" />
          <div class="form-error" id="phoneError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" />
          <div class="form-error" id="passwordError"></div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" />
          <div class="form-error" id="confirmPasswordError"></div>
        </div>

        <div class="checkbox-row">
          <input type="checkbox" id="terms" name="terms" />
          <label for="terms">
            I agree to the <a href="#" style="color: var(--green-main);">Terms & Conditions</a> and
            <a href="#" style="color: var(--green-main);">Privacy Policy</a>
          </label>
        </div>
        <div class="form-error" id="termsError">You must accept the terms to continue</div>

        <button type="submit" class="btn btn-primary btn-block">Register</button>
      </form>

      <p class="auth-footer-note">
        Already have an account? <a href="login.html">Log In</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
